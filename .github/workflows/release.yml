name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: publish ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: zip
            exe: Husky.exe
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
            exe: Husky

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Husky.sln

      - name: Build
        run: dotnet build Husky.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Husky.sln --configuration Release --no-build

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          if [ -z "$tag" ] || [ "$tag" = "main" ]; then
            echo "Could not resolve a release tag." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # ─── Single-file trim build (primary artifact) ──────────────────────

      - name: Publish trimmed single-file (${{ matrix.rid }})
        shell: bash
        run: |
          dotnet publish src/Husky/Husky.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --output publish/${{ matrix.rid }} \
            -p:IsPublishing=true

      # ─── AOT build (secondary artifact, native binary) ──────────────────

      - name: Publish AOT (${{ matrix.rid }})
        shell: bash
        run: |
          dotnet publish src/Husky/Husky.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --output publish/${{ matrix.rid }}-aot \
            -p:PublishAot=true \
            -p:PublishSingleFile=false \
            -p:IncludeNativeLibrariesForSelfExtract=false \
            -p:EnableCompressionInSingleFile=false \
            -p:SelfContained=true \
            -p:StripSymbols=true

      - name: Pack Husky.Client NuGet
        if: matrix.rid == 'linux-x64'
        run: dotnet pack src/Husky.Client/Husky.Client.csproj --configuration Release --output nupkg --no-build

      # ─── Archive both binaries ──────────────────────────────────────────

      - name: Archive trim build (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath "husky-$tag-${{ matrix.rid }}.zip"
          Compress-Archive -Path publish/${{ matrix.rid }}-aot/${{ matrix.exe }} -DestinationPath "husky-$tag-${{ matrix.rid }}-aot.zip"

      - name: Archive trim build (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          tar -czf "husky-${tag}-${{ matrix.rid }}.tar.gz" -C publish/${{ matrix.rid }} .
          tar -czf "husky-${tag}-${{ matrix.rid }}-aot.tar.gz" -C publish/${{ matrix.rid }}-aot ${{ matrix.exe }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: husky-${{ matrix.rid }}
          path: |
            husky-*-${{ matrix.rid }}.zip
            husky-*-${{ matrix.rid }}.tar.gz
            husky-*-${{ matrix.rid }}-aot.zip
            husky-*-${{ matrix.rid }}-aot.tar.gz
            nupkg/*.nupkg
            nupkg/*.snupkg
          if-no-files-found: ignore

  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/husky-*.zip
            artifacts/**/husky-*.tar.gz
            artifacts/**/*.nupkg
            artifacts/**/*.snupkg
          generate_release_notes: true
          fail_on_unmatched_files: false
